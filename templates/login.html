<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Otel Leo & Cunda Villa — Giriş</title>
<style>
:root{--bg:#0d1b2a;--card:#1a2f4a;--border:#2d5282;--accent:#64d2ff;--accent2:#48e59b;--accent3:#ff7c7c;--text:#e8f4fd;--text2:#a8c8e8}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center}
.box{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:44px 40px;width:400px;text-align:center}
.icon{font-size:56px;display:block;margin-bottom:14px}
h1{font-size:20px;font-weight:700;color:var(--accent);margin-bottom:4px}
.sub{color:var(--text2);font-size:13px;margin-bottom:32px}
.form-group{text-align:left;margin-bottom:16px}
label{display:block;font-size:12px;color:var(--text2);font-weight:600;margin-bottom:6px}
input{width:100%;background:#0a1628;border:1px solid var(--border);color:var(--text);padding:10px 14px;border-radius:7px;font-size:14px;outline:none}
input:focus{border-color:var(--accent)}
button{width:100%;background:var(--accent2);color:#0d1117;border:none;padding:12px;border-radius:7px;font-size:14px;font-weight:700;cursor:pointer;margin-top:8px}
button:hover{opacity:.9}
.error{background:#3a1a1a;border:1px solid var(--accent3);color:var(--accent3);padding:10px 14px;border-radius:7px;margin-bottom:16px;font-size:13px;text-align:left}
</style>
</head>
<body>
<div class="box">
  <span class="icon">🏨</span>
  <h1>Otel Leo & Cunda Villa</h1>
  <p class="sub">Devam etmek için giriş yapın</p>

  {% if error %}
  <div class="error">⚠️ {{ error }}</div>
  {% endif %}

  <form method="POST" action="/login">
    <div class="form-group">
      <label>Kullanıcı Adı</label>
      <input type="text" name="username" placeholder="Kullanıcı adı" autofocus required>
    </div>
    <div class="form-group">
      <label>Şifre</label>
      <input type="password" name="password" placeholder="••••••" required>
    </div>
    <button type="submit">🔐 Giriş Yap</button>
  </form>
</div>
</body>
</html>
